<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowstacy — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0812;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .logo {
      font-size: 24px;
      font-weight: 500;
      color: #9D92F8;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }
    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 24px;
    }
    button {
      background: #534AB7;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <p class="logo">flowstacy</p>
    <h1>You are offline</h1>
    <p>Your streak is safe. Connect to the internet to continue your 21-day journey.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
